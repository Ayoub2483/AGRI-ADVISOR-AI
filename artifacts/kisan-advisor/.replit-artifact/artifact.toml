kind = "mobile"
previewPath = "/"
title = "Kisan Advisor"
version = "1.0.0"
id = "artifacts/kisan-advisor"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21911

[services.development]
run = "pnpm --filter @workspace/kisan-advisor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kisan-advisor", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/kisan-advisor", "run", "serve" ]

[services.env]
PORT = "21911"
BASE_PATH = "/"
